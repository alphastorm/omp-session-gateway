name: Platform qualification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-service-lifecycle:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Check out pinned OMP source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: can1357/oh-my-pi
          ref: 39c95e5e29b1c8b082059f57421ce445c3dffdd4
          path: .qualification/oh-my-pi
          persist-credentials: false
      - name: Apply and test the Windows OMP publisher
        shell: pwsh
        run: |
          $upstream = "$env:GITHUB_WORKSPACE\.qualification\oh-my-pi"
          git -C $upstream config core.autocrlf false
          git -C $upstream reset --hard HEAD
          if ($LASTEXITCODE -ne 0) { throw "OMP source line endings could not be normalized" }
          $patchSource = "$env:GITHUB_WORKSPACE\patches\oh-my-pi\0001-collab-controller-autostart-registry.patch"
          $normalizedPatch = "$env:RUNNER_TEMP\omp-session-gateway-omp.patch"
          $patchText = [System.IO.File]::ReadAllText($patchSource).Replace("`r`n", "`n")
          [System.IO.File]::WriteAllText($normalizedPatch, $patchText, [System.Text.UTF8Encoding]::new($false))
          git -C $upstream apply $normalizedPatch
          if ($LASTEXITCODE -ne 0) { throw "OMP patch did not apply" }
          Push-Location $upstream
          try {
            bun install --frozen-lockfile
            if ($LASTEXITCODE -ne 0) { throw "OMP dependencies failed to install" }
            bun test packages/coding-agent/test/collab/registry-publisher.test.ts
            if ($LASTEXITCODE -ne 0) { throw "OMP Windows publisher tests failed" }
            bunx tsc --noEmit -p packages/coding-agent/tsconfig.json
            if ($LASTEXITCODE -ne 0) { throw "patched OMP coding-agent typecheck failed" }
          } finally {
            Pop-Location
          }
      - name: Validate Windows contracts and ACLs
        run: bun test apps/gateway/test/config.test.ts apps/gateway/test/ipc.test.ts apps/gateway/test/service.test.ts apps/gateway/test/diagnostics.test.ts
      - name: Install and start current-user task
        run: bun apps/gateway/src/cli.ts install --origin https://gateway.example.ts.net --allow allowed@example.com
      - name: Verify active service
        shell: pwsh
        run: |
          $status = bun apps/gateway/src/cli.ts status | ConvertFrom-Json
          if (-not $status.installed -or -not $status.active -or -not $status.ready) {
            throw "gateway status was not installed, active, and ready"
          }
          $process = Get-CimInstance Win32_Process |
            Where-Object { $_.Name -eq 'bun.exe' -and $_.CommandLine -like '*OMP Session Gateway\state\installation\versions\*\apps\gateway\src\cli.js*serve*' } |
            Select-Object -First 1
          if ($null -eq $process) { throw "gateway process was not found" }
          $process.ProcessId | Set-Content -NoNewline "$env:RUNNER_TEMP\gateway-pid.txt"
      - name: Reject another local user's publisher write access
        shell: pwsh
        run: |
          $domain = if ($env:USERDOMAIN) { $env:USERDOMAIN } elseif ($env:COMPUTERNAME) { $env:COMPUTERNAME } else { "local" }
          $identity = "$domain\$env:USERNAME".ToLowerInvariant()
          $digest = [System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::UTF8.GetBytes($identity))
          $pipeName = "omp-session-gateway-$([Convert]::ToHexString($digest).ToLowerInvariant().Substring(0, 20))"

          $currentUserProbe = [System.IO.Pipes.NamedPipeClientStream]::new(
            ".",
            $pipeName,
            [System.IO.Pipes.PipeDirection]::InOut
          )
          try {
            $currentUserProbe.Connect(1000)
            if (-not $currentUserProbe.IsConnected) { throw "current user could not connect to publisher pipe" }
          } finally {
            $currentUserProbe.Dispose()
          }

          $probePath = "$env:PUBLIC\omp-gateway-pipe-probe.ps1"
          @'
          param([string]$PipeName)
          foreach ($direction in @(
            [System.IO.Pipes.PipeDirection]::Out,
            [System.IO.Pipes.PipeDirection]::InOut
          )) {
            $probe = [System.IO.Pipes.NamedPipeClientStream]::new(".", $PipeName, $direction)
            $connected = $false
            try {
              $probe.Connect(750)
              $connected = $probe.IsConnected
            } catch [System.UnauthorizedAccessException] {
            } catch [System.TimeoutException] {
            } finally {
              $probe.Dispose()
            }
            if ($connected) { exit 91 }
          }
          exit 0
          '@ | Set-Content -LiteralPath $probePath -Encoding utf8

          $otherUser = "ompgatewayprobe"
          $password = "Omp!" + [Guid]::NewGuid().ToString("N").Substring(0, 8) + "1"
          & net.exe user $otherUser $password /add /expires:never
          if ($LASTEXITCODE -ne 0) { throw "failed to create pipe ACL probe user" }
          try {
            $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
            $credential = [System.Management.Automation.PSCredential]::new(
              "$env:COMPUTERNAME\$otherUser",
              $securePassword
            )
            $probeProcess = Start-Process `
              -FilePath "powershell.exe" `
              -Credential $credential `
              -ArgumentList @("-NoProfile", "-NonInteractive", "-ExecutionPolicy", "Bypass", "-File", $probePath, $pipeName) `
              -Wait `
              -PassThru
            if ($probeProcess.ExitCode -ne 0) {
              throw "publisher pipe granted write access to another local user (probe exit $($probeProcess.ExitCode))"
            }
          } finally {
            Remove-Item -LiteralPath $probePath -Force -ErrorAction SilentlyContinue
            & net.exe user $otherUser /delete | Out-Null
          }
      - name: Rotate token and reinstall
        shell: pwsh
        run: |
          $token = Get-Item "$env:LOCALAPPDATA\OMP Session Gateway\publisher-token"
          $beforeWrite = $token.LastWriteTimeUtc
          Start-Sleep -Milliseconds 1100
          bun apps/gateway/src/cli.ts rotate-publisher-token
          if ($LASTEXITCODE -ne 0) { throw "token rotation failed" }
          $rotated = Get-Item "$env:LOCALAPPDATA\OMP Session Gateway\publisher-token"
          if ($rotated.LastWriteTimeUtc -le $beforeWrite) { throw "token file was not replaced" }
          bun apps/gateway/src/cli.ts install --origin https://gateway.example.ts.net --allow allowed@example.com
          if ($LASTEXITCODE -ne 0) { throw "active reinstall failed" }
          $beforePid = [int](Get-Content "$env:RUNNER_TEMP\gateway-pid.txt")
          $process = Get-CimInstance Win32_Process |
            Where-Object { $_.Name -eq 'bun.exe' -and $_.CommandLine -like '*OMP Session Gateway\state\installation\versions\*\apps\gateway\src\cli.js*serve*' } |
            Select-Object -First 1
          if ($null -eq $process -or $process.ProcessId -eq $beforePid) {
            throw "active reinstall did not replace the gateway process"
          }
          $status = bun apps/gateway/src/cli.ts status | ConvertFrom-Json
          if (-not $status.installed -or -not $status.active -or -not $status.ready) {
            throw "gateway did not recover after reinstall"
          }
      - name: Refuse no-stop uninstall while active
        shell: pwsh
        run: |
          bun apps/gateway/src/cli.ts uninstall --no-stop
          if ($LASTEXITCODE -eq 0) { throw "active no-stop uninstall unexpectedly succeeded" }
          $status = bun apps/gateway/src/cli.ts status | ConvertFrom-Json
          if (-not $status.installed -or -not $status.active -or -not $status.ready) {
            throw "no-stop refusal altered the active service"
          }
      - name: Uninstall current-user task
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "$env:LOCALAPPDATA\OMP Session Gateway\config.json") {
            bun apps/gateway/src/cli.ts uninstall
            if ($LASTEXITCODE -ne 0) { throw "gateway uninstall failed" }
          }
          if ($null -ne (Get-ScheduledTask -TaskName 'OMP Session Gateway' -ErrorAction SilentlyContinue)) {
            throw "scheduled task remained after uninstall"
          }
          Start-Sleep -Milliseconds 500
          $process = Get-CimInstance Win32_Process |
            Where-Object { $_.Name -eq 'bun.exe' -and $_.CommandLine -like '*OMP Session Gateway\state\installation\versions\*\apps\gateway\src\cli.js*serve*' } |
            Select-Object -First 1
          if ($null -ne $process) { throw "gateway process remained after uninstall" }
