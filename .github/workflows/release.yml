name: Keyless release

on:
  push:
    tags:
      - "v*-prealpha.*"
      - "provenance-test-v*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-attest-sign-release:
    name: Build, attest, sign, and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Validate protected pre-alpha tag
        run: |
          set -euo pipefail
          version="$(bun -e 'process.stdout.write((await Bun.file("package.json").json()).version)')"
          escaped_version="${version//./\\.}"
          allowed="^(v${escaped_version}-prealpha\.[1-9][0-9]*|provenance-test-v${escaped_version}\.[1-9][0-9]*)$"
          if [[ ! "$GITHUB_REF_NAME" =~ $allowed ]]; then
            echo "Tag must be v${version}-prealpha.<n> or provenance-test-v${version}.<n> (n >= 1)." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Tagged commit must be reachable from origin/main." >&2
            exit 1
          fi
          archive="dist/release/omp-session-gateway-${version}-bun.tar"
          checksums="dist/release/SHA256SUMS"
          sbom="dist/release/omp-session-gateway-${version}.spdx.json"
          {
            echo "PACKAGE_VERSION=$version"
            echo "ARCHIVE_PATH=$archive"
            echo "SBOM_PATH=$sbom"
            echo "CHECKSUM_PATH=$checksums"
          } >> "$GITHUB_ENV"


      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gates
        run: bun run check

      - name: Build deterministic archive
        run: |
          set -euo pipefail
          bun run release:build
          test -f "$ARCHIVE_PATH"
          test -f "$SBOM_PATH"
          test -f "$CHECKSUM_PATH"
          if [[ "$(find dist/release -maxdepth 1 -type f | wc -l | tr -d ' ')" != "3" ]]; then
            echo "Release builder emitted unexpected files." >&2
            exit 1
          fi
          (cd dist/release && sha256sum --check SHA256SUMS)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/release/omp-session-gateway-*-bun.tar
            dist/release/omp-session-gateway-*.spdx.json
            dist/release/SHA256SUMS

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Sign artifacts with GitHub OIDC
        run: |
          set -euo pipefail
          for artifact in "$ARCHIVE_PATH" "$SBOM_PATH" "$CHECKSUM_PATH"; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          done

      - name: Verify checksums, provenance, and signatures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          (cd dist/release && sha256sum --check SHA256SUMS)
          signer_workflow="$GITHUB_REPOSITORY/.github/workflows/release.yml"
          certificate_identity="https://github.com/${signer_workflow}@${GITHUB_REF}"
          for artifact in "$ARCHIVE_PATH" "$SBOM_PATH" "$CHECKSUM_PATH"; do
            gh attestation verify "$artifact" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$signer_workflow" \
              --source-ref "$GITHUB_REF"
            cosign verify-blob \
              --bundle "${artifact}.sigstore.json" \
              --certificate-identity "$certificate_identity" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$artifact"
          done

      - name: Create complete draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to mutate it." >&2
            exit 1
          fi
          notes="$RUNNER_TEMP/release-notes.md"
          if [[ "$GITHUB_REF_NAME" == provenance-test-* ]]; then
            cat > "$notes" <<EOF
          ## Provenance workflow test; not an alpha release

          This release exercises the pre-alpha build and keyless provenance path. It is not an alpha or production-qualified release.

          - Source commit: \`$GITHUB_SHA\`
          - OMP baseline: \`89d6a8f6d14286f32f09ec9c8aa8af7b3451d2d6\` (nearest release v17.0.6)
          - Runtime: Bun 1.3.14 or newer
          - Registry protocol: 1
          - Verification: [docs/RELEASE.md](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_SHA/docs/RELEASE.md)
          EOF
          else
            cat > "$notes" <<EOF
          ## Pre-alpha; physical background-push qualification pending

          This release adds opt-in background Web Push to the installed **OMP Sessions** PWA. It is not an alpha or production-qualified release.

          ### User-visible changes

          - **Enable background alerts** creates a browser Push subscription only after an explicit tap.
          - A background notification uses fixed text and carries only instance/generation metadata.
          - Tapping a current notification revalidates the exact attention generation and opens Control through the existing no-store, in-memory capability launch.
          - Resolution, generation replacement, and stale endpoints remove obsolete notifications or subscriptions.

          ### Security

          Collaboration capabilities, prompt content, session labels, paths, and transcripts never enter Push payloads, notification text, routes, logs, or persisted Push state. The per-install VAPID private key and bounded browser subscriptions use the existing private state-directory permissions.

          ### Install or upgrade

          Extract \`omp-session-gateway-${PACKAGE_VERSION}-bun.tar\`, then run \`bun apps/gateway/src/cli.js install --origin https://host.tailnet.ts.net --allow user@example.com\` from the extracted directory, replacing both values with the existing canonical origin and allowed identity. Repeat \`--allow\` for additional identities. Active reinstall with the same values preserves the publisher token. Reload or reopen the canonical PWA, then tap **Enable background alerts** and accept the browser permission prompt.

          ### Compatibility and known issues

          - Source commit: \`$GITHUB_SHA\`
          - Exact release baseline: OMP v17.0.6 at \`89d6a8f6d14286f32f09ec9c8aa8af7b3451d2d6\` with the included patch.
          - Runtime: Bun 1.3.14 or newer; registry protocol 1; Push API 1.
          - Chrome/Android delivery uses the browser vendor's Push service and requires outbound Internet access.
          - Closed-PWA, lock-screen, force-stop, notification-tap, stale-generation, and network-change behavior remains unqualified on physical Android for this candidate.

          ### Rollback

          To remove background Push, reinstall the signed \`v0.1.0-prealpha.5\` archive with \`bun apps/gateway/src/cli.js install --origin https://host.tailnet.ts.net --allow user@example.com\`, using the deployment's real values. The older gateway ignores the private Push state; existing publisher credentials remain valid.

          Verification instructions: [docs/RELEASE.md](https://github.com/$GITHUB_REPOSITORY/blob/$GITHUB_SHA/docs/RELEASE.md).
          EOF
          fi
          gh release create "$GITHUB_REF_NAME" \
            "$ARCHIVE_PATH" \
            "$SBOM_PATH" \
            "$CHECKSUM_PATH" \
            "${ARCHIVE_PATH}.sigstore.json" \
            "${SBOM_PATH}.sigstore.json" \
            "${CHECKSUM_PATH}.sigstore.json" \
            --draft \
            --prerelease \
            --latest=false \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$notes" \
            --verify-tag

      - name: Publish release once
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest=false
